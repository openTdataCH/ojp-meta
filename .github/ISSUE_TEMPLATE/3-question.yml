name: OJP Question
description: Ask a question or request clarification for OJP
title: "[OJP Question]: "
labels:
  - ojp-question

assignees:
  - vasile
  - AndreasAtSBB

body:
  - type: input
    id: organisation
    attributes:
      label: Organisation
      placeholder: SBB / BLS / ZVV / other
    validations:
      required: true

  - type: dropdown
    id: stage
    attributes:
      label: Stage
      options:
        - PROD
        - INT
        - TEST
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      options:
        - OJP v2
        - OJP v1
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Question details
      description: Explain your question or what you are trying to achieve
      placeholder: |
        What are you trying to do?
        What have you already tried?
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code / Logs
      description: Paste relevant XML request / response
      render: shell
      placeholder: |
        XML Request / Response
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag & drop screenshots or paste images here
      placeholder: Attach screenshots if relevant
    validations:
      required: false
